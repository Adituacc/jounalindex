<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="adixTRADE - Professional trading journal and performance dashboard" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>adixTRADE - Trading Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
        background: #0a0a0f; color: #7c5cfc; font-family: Inter, sans-serif;
      }
      #app-loader .spinner {
        width: 36px; height: 36px; border: 3px solid #1e1e2a;
        border-top-color: #7c5cfc; border-radius: 50%;
        animation: spin .8s linear infinite;
      }
      #app-loader span { font-size: 13px; color: #6b7280; letter-spacing: .5px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loader"><div class="spinner"></div><span>Loading adixTRADE...</span></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
